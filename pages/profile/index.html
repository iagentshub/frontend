<!doctype html>
<html lang="es">

<head>
    <script>document.documentElement.setAttribute("data-theme", localStorage.getItem("ga-theme") || "noir");</script>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>iAgents Hub · Perfil</title>
    <!-- CSS globales -->
    <link rel="stylesheet" href="/assets/css/variables.css" />
    <link rel="stylesheet" href="/assets/themes/themes.css" />
    <link rel="stylesheet" href="/assets/css/base.css" />
    <link rel="stylesheet" href="/assets/css/components.css" />
    <link rel="stylesheet" href="/assets/css/layout.css" />
    <link rel="stylesheet" href="/assets/css/modals.css" />
    <link rel="stylesheet" href="/assets/css/animations.css" />
    <!-- Componentes -->
    <link rel="stylesheet" href="/assets/components/main_nav/main_nav.css" />
    <!-- Página -->
    <link rel="stylesheet" href="/profile/profile.css" />
</head>

<body>
    <div class="app-shell">
        <div id="nav-root"></div>

        <main class="page-content">
            <div class="page-header">
                <div>
                    <h1 class="page-title" data-i18n="profile.page.title">Perfil</h1>
                    <p class="page-subtitle" data-i18n="profile.page.subtitle">Configuracion de tu cuenta</p>
                </div>
            </div>

            <div class="profile-card">
                <div class="profile-avatar-row">
                    <div class="profile-avatar" id="profile-avatar">A</div>
                    <div>
                        <div class="profile-username" id="profile-username">…</div>
                        <div class="profile-role" id="profile-role">…</div>
                    </div>
                </div>
            </div>

            <div class="profile-card" id="accounts-card">
                <div class="profile-card-title" data-i18n="profile.accounts.title">Conectar cuentas</div>
                <p class="profile-card-subtitle" data-i18n="profile.accounts.subtitle"></p>
                <div id="accounts-list" class="accounts-list"></div>
            </div>

            <div class="profile-card" id="theme-picker-card">
                <div class="profile-card-title" data-i18n="profile.theme_title">Tema</div>
                <div class="theme-picker" id="theme-picker"></div>
            </div>

            <div class="profile-card" id="lang-picker-card">
                <div class="profile-card-title" data-i18n="profile.lang_title">Idioma / Language</div>
                <div class="lang-picker" id="lang-picker"></div>
            </div>

            <div class="profile-card" id="password-card">
                <div class="profile-card-title" data-i18n="profile.password_title">Cambiar contraseña</div>
                <form id="password-form" novalidate>
                    <div class="field">
                        <label data-i18n="profile.password.field_current">Contraseña actual</label>
                        <input id="pw-current" class="input" type="password" autocomplete="current-password"
                            placeholder="••••••••" />
                    </div>
                    <div class="field">
                        <label data-i18n="profile.password.field_new">Nueva contraseña</label>
                        <input id="pw-new" class="input" type="password" autocomplete="new-password"
                            placeholder="••••••••" />
                    </div>
                    <div class="field">
                        <label data-i18n="profile.password.field_confirm">Confirmar contraseña</label>
                        <input id="pw-confirm" class="input" type="password" autocomplete="new-password"
                            placeholder="••••••••" />
                    </div>
                    <div class="profile-form-footer">
                        <button type="submit" class="btn btn-primary" id="pw-save-btn" data-i18n="profile.password.save_btn">Guardar cambios</button>
                    </div>
                </form>
            </div>
        </main>
    </div>

    <!-- Modal vincular cuenta -->
    <div id="account-modal" class="modal-bg" style="display:none">
        <div class="modal-box">
            <div class="modal-header">
                <span class="modal-title" id="account-modal-title">Vincular cuenta</span>
                <button class="modal-close" id="account-modal-close" type="button">
                    <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
                        <path d="M2 2l12 12M14 2L2 14" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" />
                    </svg>
                </button>
            </div>
            <div class="modal-body">
                <input type="hidden" id="account-modal-provider" />
                <div class="field" id="account-field-apikey">
                    <label data-i18n="profile.accounts.field_api_key">API Key</label>
                    <input id="account-api-key" class="input" type="password" autocomplete="off" placeholder="sk-…" />
                </div>
                <div class="field" id="account-field-host" style="display:none">
                    <label data-i18n="profile.accounts.field_host">Host</label>
                    <input id="account-host" class="input" type="text" placeholder="http://localhost:11434" />
                    <span class="input-hint" data-i18n="profile.accounts.host_hint">Si usas Docker, prueba con host.docker.internal en lugar de localhost.</span>
                </div>
                <div id="account-test-result" class="account-test-result" style="display:none"></div>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-ghost" id="account-modal-test" data-i18n="profile.accounts.test_btn">Testear</button>
                <div style="flex:1"></div>
                <button type="button" class="btn btn-ghost" id="account-modal-cancel" data-i18n="common.actions.cancel">Cancelar</button>
                <button type="button" class="btn btn-primary" id="account-modal-save" data-i18n="profile.accounts.save_btn">Vincular</button>
            </div>
        </div>
    </div>

    <!-- JS globales -->
    <script src="/assets/js/i18n.js"></script>
    <script src="/assets/js/config.js"></script>
    <script src="/assets/js/theme.js"></script>
    <script src="/assets/js/toast.js"></script>
    <script src="/assets/js/auth.js"></script>
    <script src="/assets/js/api.js"></script>
    <script src="/assets/js/utils.js"></script>
    <!-- Componentes -->
    <script src="/assets/components/main_nav/main_nav.js"></script>
    <!-- Página -->
    <script src="/profile/profile.js"></script>
    <script src="/profile/profile-accounts.js"></script>
</body>

</html>
