<!doctype html>
<html lang="es">

<head>
    <script>document.documentElement.setAttribute("data-theme", localStorage.getItem("ga-theme") || "noir");</script>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>iAgents Hub · Skills</title>
    <!-- CSS globales -->
    <link rel="stylesheet" href="/assets/css/variables.css" />
    <link rel="stylesheet" href="/assets/themes/themes.css" />
    <link rel="stylesheet" href="/assets/css/base.css" />
    <link rel="stylesheet" href="/assets/css/components.css" />
    <link rel="stylesheet" href="/assets/css/layout.css" />
    <link rel="stylesheet" href="/assets/css/modals.css" />
    <link rel="stylesheet" href="/assets/css/animations.css" />
    <!-- Componentes -->
    <link rel="stylesheet" href="/assets/components/main_nav/main_nav.css" />
    <link rel="stylesheet" href="/assets/components/skill-card/skill-card.css" />
    <link rel="stylesheet" href="/assets/components/skill-catalog/skill-catalog.css" />
    <link rel="stylesheet" href="/assets/components/dialog_skill/dialog_skill.css" />
    <!-- Página -->
    <link rel="stylesheet" href="/skills/skills.css" />
</head>

<body>
    <div class="app-shell">
        <div id="nav-root"></div>
        <main class="page-content" id="page-main">
            <div class="page-header">
                <h1 class="page-title" data-i18n="skills.page.title">Skills</h1>
                <div class="page-actions">
                    <button class="btn btn-ghost" id="btn-skill-catalog" data-i18n="skills.catalog.open_btn">Catálogo</button>
                    <button class="btn btn-ghost" id="btn-load-skill">
                        <svg width="13" height="13" viewBox="0 0 13 13" fill="none">
                            <path d="M6.5 8.5V1M3 4L6.5 1 10 4" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
                            <path d="M1 10.5v1a.5.5 0 00.5.5h10a.5.5 0 00.5-.5v-1" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
                        </svg>
                        <span data-i18n="skills.page.load_btn">Cargar</span>
                    </button>
                    <button class="btn btn-primary" id="btn-new-skill">
                        <svg width="13" height="13" viewBox="0 0 13 13" fill="none">
                            <path d="M6.5 1v11M1 6.5h11" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" />
                        </svg>
                        <span data-i18n="skills.page.new_btn">Nueva habilidad privada</span>
                    </button>
                </div>
                <input type="file" id="skill-file-input" accept=".json" style="display:none">
            </div>
            <div id="skills-grid" class="skills-grid"></div>
        </main>
    </div>

    <!-- Modal ver skill -->
    <div id="skill-view-modal" class="modal-bg" style="display:none">
        <div class="modal-box" style="width:600px">
            <div class="modal-header">
                <span class="modal-title" id="skill-view-title"></span>
                <button class="modal-close" id="skill-view-close" type="button">
                    <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
                        <path d="M2 2l12 12M14 2L2 14" stroke="currentColor" stroke-width="1.8"
                            stroke-linecap="round" />
                    </svg>
                </button>
            </div>
            <div class="modal-body">
                <pre id="skill-view-content" class="skill-content-pre"></pre>
            </div>
        </div>
    </div>

    <!-- Modal catálogo de skills públicas -->
    <div id="skill-catalog-bg" class="modal-bg" style="display:none">
        <div class="sc-box">
            <div class="sc-header">
                <div class="sc-search-wrap">
                    <svg width="14" height="14" viewBox="0 0 16 16" fill="none">
                        <circle cx="6.5" cy="6.5" r="4" stroke="currentColor" stroke-width="1.6"/>
                        <path d="M11 11l3 3" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/>
                    </svg>
                    <input id="sc-search" class="sc-search-input" data-i18n-placeholder="skills.catalog.search_placeholder" placeholder="Buscar skills…" autocomplete="off" />
                </div>
                <button id="sc-close" class="modal-close" type="button">
                    <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
                        <path d="M2 2l12 12M14 2L2 14" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" />
                    </svg>
                </button>
            </div>
            <div id="sc-grid" class="sc-grid"></div>
        </div>
    </div>

    <!-- JS globales -->
    <script src="/assets/js/i18n.js"></script>
    <script src="/assets/js/config.js"></script>
    <script src="/assets/js/theme.js"></script>
    <script src="/assets/js/toast.js"></script>
    <script src="/assets/js/auth.js"></script>
    <script src="/assets/js/api.js"></script>
    <script src="/assets/js/utils.js"></script>
    <!-- Componentes -->
    <script src="/assets/components/main_nav/main_nav.js"></script>
    <script src="/assets/components/skill-card/skill-card.js"></script>
    <script src="/assets/components/skill-catalog/skill-catalog.js"></script>
    <script src="/assets/components/dialog_skill/dialog_skill.js"></script>
    <!-- Página -->
    <script src="/skills/skills-load.js"></script>
    <script src="/skills/skills.js"></script>
</body>

</html>
