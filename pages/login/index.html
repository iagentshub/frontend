<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>iAgents Hub — Login</title>
  <link rel="stylesheet" href="/pages/login/login.css">
</head>
<body class="login-page">
  <!-- animated background orbs -->
  <div class="login-bg">
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>
  </div>

  <div class="login-wrap">
    <!-- left: branding -->
    <div class="login-brand">
      <div class="login-logo">iAgents<span>Hub</span></div>
      <h1>Toda tu IA en un solo lugar</h1>
      <p>Agentes, skills y modelos multi-proveedor desde una sola plataforma.</p>
      <div class="login-stats">
        <div class="login-stat">
          <span class="stat-num">6<span class="stat-accent">+</span></span>
          <span class="stat-label">Proveedores</span>
        </div>
        <div class="login-stat">
          <span class="stat-num"><span class="stat-accent">&#8734;</span></span>
          <span class="stat-label">Agentes</span>
        </div>
        <div class="login-stat">
          <span class="stat-num">100<span class="stat-accent">%</span></span>
          <span class="stat-label">Privado</span>
        </div>
      </div>
    </div>

    <!-- right: form -->
    <div class="login-card">
      <div class="login-card-logo">iA</div>
      <h2>Bienvenido</h2>
      <p class="login-sub">Accede a tu espacio de agentes</p>

      <form id="login-form" autocomplete="on" novalidate>
        <div class="field">
          <label for="login-email">Email</label>
          <input id="login-email" type="email" name="email" autocomplete="email" placeholder="tu@email.com" required>
        </div>
        <div class="field">
          <label for="login-password">Contraseña</label>
          <div class="field-pw">
            <input id="login-password" type="password" name="password" autocomplete="current-password" placeholder="••••••••" required>
            <button type="button" id="toggle-pw" class="pw-toggle" tabindex="-1">👁</button>
          </div>
        </div>
        <div id="login-error" class="form-error" style="display:none"></div>
        <button type="submit" class="btn btn-primary btn-full" id="login-btn">Entrar</button>
      </form>

      <div class="login-divider"><span>o</span></div>
      <button id="btn-guest" class="btn btn-ghost btn-full">Acceder como invitado</button>

      <p class="login-register-link">¿No tienes cuenta? <a href="/register/">Crear cuenta</a></p>
    </div>
  </div>

  <script src="/assets/js/i18n.js"></script>
  <script src="/pages/login/login.js"></script>
</body>
</html>
