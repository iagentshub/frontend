<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>iAgents Hub — Login</title>
  <script src="/assets/js/theme-early.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" />
  <link rel="stylesheet" href="/assets/dist/core.css" />
  <link rel="stylesheet" href="/login/login.css">
</head>

<body class="login-page">
  <div class="login-wrap login-wrap--narrow">
    <div class="login-card login-card--wide">
      <a class="login-card-logo" href="/">iAgents<span>Hub</span></a>
      <h2 data-i18n="auth.card_title">Bienvenido</h2>
      <p class="login-sub" data-i18n="auth.card_sub">Accede a tu espacio de agentes</p>

      <form id="login-form" autocomplete="on" novalidate>
        <div class="field">
          <label for="login-email" data-i18n="auth.field_email">Email</label>
          <input id="login-email" type="email" name="email" autocomplete="email" placeholder="tu@email.com" required>
        </div>
        <div class="field">
          <label for="login-password" data-i18n="auth.field_password">Contraseña</label>
          <div class="field-pw">
            <input id="login-password" type="password" name="password" autocomplete="current-password"
              placeholder="••••••••" required>
            <button type="button" id="toggle-pw" class="pw-toggle" tabindex="-1" aria-label="Mostrar contraseña">
              <svg width="18" height="18" viewBox="0 0 18 18" fill="none" aria-hidden="true">
                <path d="M1 9s3-5.5 8-5.5S17 9 17 9s-3 5.5-8 5.5S1 9 1 9z" stroke="currentColor" stroke-width="1.5"
                  stroke-linejoin="round" />
                <circle cx="9" cy="9" r="2.5" stroke="currentColor" stroke-width="1.5" />
              </svg>
            </button>
          </div>
        </div>
        <div id="login-error" class="form-error" style="display:none"></div>
        <button type="submit" class="btn btn-primary btn-full" id="login-btn" data-i18n="auth.login_btn">Entrar</button>
        <p style="text-align:right;margin:8px 0 0"><a href="/forgot-password/"
            style="font-size:12px;color:var(--ink-2,#888)" data-i18n="auth.forgot_password">¿Olvidaste tu
            contraseña?</a></p>
      </form>

      <div class="login-divider"><span data-i18n="auth.divider">o</span></div>

      <div class="login-oauth-row">
        <button type="button" class="login-oauth-btn" disabled title="Próximamente" aria-label="Iniciar sesión con Google (próximamente)">
          <svg viewBox="0 0 18 18" aria-hidden="true">
            <path fill="#4285F4" d="M17.64 9.2c0-.637-.057-1.251-.164-1.84H9v3.481h4.844c-.209 1.125-.843 2.078-1.796 2.717v2.258h2.908c1.702-1.567 2.684-3.874 2.684-6.615z"/>
            <path fill="#34A853" d="M9 18c2.43 0 4.467-.806 5.956-2.18l-2.908-2.259c-.806.54-1.837.86-3.048.86-2.344 0-4.328-1.584-5.036-3.711H.957v2.332C2.438 15.983 5.482 18 9 18z"/>
            <path fill="#FBBC05" d="M3.964 10.71c-.18-.54-.282-1.117-.282-1.71s.102-1.17.282-1.71V4.958H.957C.347 6.173 0 7.548 0 9s.348 2.827.957 4.042l3.007-2.332z"/>
            <path fill="#EA4335" d="M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.463.891 11.426 0 9 0 5.482 0 2.438 2.017.957 4.958L3.964 7.29C4.672 5.163 6.656 3.58 9 3.58z"/>
          </svg>
        </button>
        <button type="button" class="login-oauth-btn" disabled title="Próximamente" aria-label="Iniciar sesión con Apple (próximamente)">
          <svg viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
            <path d="M18.71 19.5c-.83 1.24-1.71 2.45-3.05 2.47-1.34.03-1.77-.79-3.29-.79-1.53 0-2 .77-3.27.82-1.31.05-2.3-1.32-3.14-2.53C4.25 17 2.94 12.45 4.7 9.39c.87-1.52 2.43-2.48 4.12-2.51 1.28-.02 2.5.87 3.29.87.78 0 2.26-1.07 3.81-.91.65.03 2.47.26 3.64 1.98-.09.06-2.17 1.28-2.15 3.81.03 3.02 2.65 4.03 2.68 4.04-.03.07-.42 1.44-1.38 2.83M13 3.5c.73-.83 1.94-1.46 2.94-1.5.13 1.17-.34 2.35-1.04 3.19-.69.85-1.83 1.51-2.95 1.42-.15-1.15.41-2.35 1.05-3.11z"/>
          </svg>
        </button>
        <button type="button" class="login-oauth-btn" disabled title="Próximamente" aria-label="Iniciar sesión con Microsoft (próximamente)">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <rect x="1" y="1" width="10" height="10" fill="#F25022"/>
            <rect x="13" y="1" width="10" height="10" fill="#7FBA00"/>
            <rect x="1" y="13" width="10" height="10" fill="#00A4EF"/>
            <rect x="13" y="13" width="10" height="10" fill="#FFB900"/>
          </svg>
        </button>
      </div>

      <button id="btn-guest" class="btn btn-ghost btn-full" data-i18n="auth.guest_login" style="display:none">Acceder como invitado</button>

      <p class="login-register-link" style="display:none"><span data-i18n="auth.register_text">¿No tienes cuenta?</span> <a href="/register/"
          data-i18n="auth.register_action">Crear cuenta</a></p>

      <div class="login-explore">
        <a href="/pricing/" data-i18n="auth.pricing_link" style="display:none">Precios</a>
        <span class="login-explore-sep login-lang-sep"></span>
        <button class="login-lang-btn" id="login-lang-btn">ES</button>
      </div>
    </div>
  </div>

  <script src="/assets/js/flog.js" defer></script>
  <script src="/assets/js/i18n.js" defer></script>
  <script src="/login/login.js" defer></script>
  <script src="/login/login-lang.js" defer></script>
    <script type="speculationrules">
    {
      "prefetch": [{
        "source": "document",
        "where": { "and": [
          { "href_matches": "/*" },
          { "not": { "href_matches": "/api/*" } },
          { "not": { "selector_matches": "[target=_blank]" } },
          { "not": { "selector_matches": "[rel~=nofollow]" } }
        ]},
        "eagerness": "moderate"
      }]
    }
    </script>
</body>

</html>
