<!doctype html>
<html lang="es">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>iAgents Hub · Documentación</title>
    <script src="/assets/js/theme-early.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" />
    <link rel="stylesheet" href="/assets/dist/core.css" />
    <link rel="stylesheet" href="/docs/docs.css" />
</head>

<body class="docs-page">

    <header class="docs-header">
        <a class="docs-logo" href="/">iAgents<span>Hub</span></a>
        <div class="docs-header-divider"></div>
        <span class="docs-header-label" data-i18n="docs.page.title">Documentación</span>
        <div class="docs-header-spacer"></div>
        <button class="docs-header-lang" id="docs-lang-btn">ES</button>
        <a href="/login/" class="docs-header-action" id="docs-header-action">Iniciar sesión</a>
    </header>

    <div class="docs-shell">
        <aside class="docs-aside">
            <nav id="docs-nav"></nav>
        </aside>
        <main class="docs-main">
            <div class="docs-hero">
                <h1 data-i18n="docs.page.title">Documentación</h1>
                <p data-i18n="docs.page.subtitle">Guías y referencia de iAgents Hub</p>
            </div>
            <div class="docs-content" id="docs-content"></div>
        </main>
    </div>

    <script src="/assets/js/flog.js" defer></script>
    <script src="/assets/js/i18n.js" defer></script>
    <script src="/docs/docs.js" defer></script>
    <script type="speculationrules">
    {
      "prefetch": [{
        "source": "document",
        "where": { "and": [
          { "href_matches": "/*" },
          { "not": { "href_matches": "/api/*" } },
          { "not": { "selector_matches": "[target=_blank]" } },
          { "not": { "selector_matches": "[rel~=nofollow]" } }
        ]},
        "eagerness": "moderate"
      }]
    }
    </script>
</body>

</html>
