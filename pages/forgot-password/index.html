<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>iAgents Hub — Recuperar contraseña</title>
  <script src="/assets/js/theme-early.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" />
  <link rel="stylesheet" href="/assets/dist/core.css" />
  <link rel="stylesheet" href="/login/login.css">
</head>

<body class="login-page">
  <div class="login-wrap login-wrap--narrow">
    <div class="login-card">
      <div class="login-card-logo">iA</div>
      <h2 style="margin-bottom:4px">Recuperar contraseña</h2>
      <p class="login-sub" style="margin-bottom:24px">Introduce tu email y te enviaremos un enlace</p>

      <div id="form-wrap">
        <form id="forgot-form" novalidate>
          <div class="field">
            <label for="forgot-email">Email</label>
            <input id="forgot-email" type="email" placeholder="tu@email.com" required autocomplete="email">
          </div>
          <div id="forgot-error" class="form-error" style="display:none"></div>
          <button type="submit" class="btn btn-primary btn-full" id="forgot-btn">Enviar enlace</button>
        </form>
      </div>

      <div id="sent-msg" style="display:none;text-align:center">
        <p style="font-size:14px;color:var(--ink-1,#ccc);line-height:1.6;margin-bottom:24px">
          Si existe una cuenta con ese email, recibirás un enlace para restablecer la contraseña.<br>
          <span style="font-size:12px;color:var(--ink-2,#888)">Revisa también la carpeta de spam.</span>
        </p>
        <a href="/login/" class="btn btn-ghost btn-full" style="display:block;text-align:center">Volver al login</a>
      </div>

      <p class="login-register-link" style="margin-top:20px"><a href="/login/">← Volver al login</a></p>
    </div>
  </div>
  <script src="/assets/js/flog.js" defer></script>
  <script src="/forgot-password/forgot-password.js" defer></script>
    <script type="speculationrules">
    {
      "prefetch": [{
        "source": "document",
        "where": { "and": [
          { "href_matches": "/*" },
          { "not": { "href_matches": "/api/*" } },
          { "not": { "selector_matches": "[target=_blank]" } },
          { "not": { "selector_matches": "[rel~=nofollow]" } }
        ]},
        "eagerness": "moderate"
      }]
    }
    </script>
</body>

</html>
