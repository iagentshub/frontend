<div class="wcfg-body">
    <div class="wcfg-title">Uso de tokens</div>

    <div class="wcfg-field">
        <span class="wcfg-label">Visualizacion</span>
        <div class="wcfg-opts">
            <label class="wcfg-opt"><input type="radio" name="vizType" value="bars"> Barras</label>
            <label class="wcfg-opt"><input type="radio" name="vizType" value="donut"> Donut</label>
        </div>
    </div>

    <div class="wcfg-field">
        <span class="wcfg-label">Agrupar por</span>
        <div class="wcfg-opts">
            <label class="wcfg-opt"><input type="radio" name="groupBy" value="connection"> Conexion</label>
            <label class="wcfg-opt"><input type="radio" name="groupBy" value="agent"> Agente</label>
        </div>
    </div>

    <div class="wcfg-field">
        <span class="wcfg-label">Conexiones</span>
        <div class="wcfg-opts">
            <label class="wcfg-opt"><input type="radio" name="scope" value="all"> Todas</label>
            <label class="wcfg-opt"><input type="radio" name="scope" value="personal"> Solo personales</label>
        </div>
    </div>

    <div class="wcfg-field">
        <span class="wcfg-label">Maximo de elementos</span>
        <select name="limit" class="select select--sm">
            <option value="3">Top 3</option>
            <option value="5">Top 5</option>
            <option value="10">Top 10</option>
        </select>
    </div>

    <div class="wcfg-actions">
        <button class="btn btn-ghost btn-sm" data-wcfg-cancel>Cancelar</button>
        <button class="btn btn-primary btn-sm" data-wcfg-save>Guardar</button>
    </div>
</div>
