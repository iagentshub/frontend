<div class="wcfg-body">
    <div class="wcfg-title">Actividad de tokens</div>

    <div class="wcfg-field">
        <span class="wcfg-label">Periodo</span>
        <select name="days" class="select select--sm">
            <option value="7">7 dias</option>
            <option value="14">14 dias</option>
            <option value="30">30 dias</option>
        </select>
    </div>

    <div class="wcfg-actions">
        <button class="btn btn-ghost btn-sm" data-wcfg-cancel>Cancelar</button>
        <button class="btn btn-primary btn-sm" data-wcfg-save>Guardar</button>
    </div>
</div>
