<div class="wcfg-body">
    <div class="wcfg-title">Estado de conexiones</div>

    <div class="wcfg-field">
        <span class="wcfg-label">Conexiones</span>
        <div class="wcfg-opts">
            <label class="wcfg-opt"><input type="radio" name="scope" value="all"> Todas</label>
            <label class="wcfg-opt"><input type="radio" name="scope" value="personal"> Solo personales</label>
        </div>
    </div>

    <div class="wcfg-actions">
        <button class="btn btn-ghost btn-sm" data-wcfg-cancel>Cancelar</button>
        <button class="btn btn-primary btn-sm" data-wcfg-save>Guardar</button>
    </div>
</div>
