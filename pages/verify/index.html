<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>iAgents Hub — Verificar cuenta</title>
  <script src="/assets/js/theme-early.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" />
  <link rel="stylesheet" href="/assets/dist/core.css" />
  <link rel="stylesheet" href="/login/login.css">
</head>

<body class="login-page">
  <div class="login-wrap login-wrap--narrow">
    <div class="login-card" style="text-align:center">
      <a class="login-card-logo" href="/">iAgents<span>Hub</span></a>
      <div id="verify-loading">
        <h2 style="margin-bottom:8px">Verificando cuenta…</h2>
        <p class="login-sub">Un momento por favor</p>
      </div>
      <div id="verify-ok" style="display:none">
        <h2 style="margin-bottom:8px">¡Cuenta verificada!</h2>
        <p class="login-sub" style="margin-bottom:24px">Tu cuenta está activa. Ya puedes entrar.</p>
        <a href="/dashboard/" class="btn btn-primary btn-full" style="display:block;text-align:center">Ir al
          dashboard</a>
      </div>
      <div id="verify-error" style="display:none">
        <h2 style="margin-bottom:8px">Enlace inválido</h2>
        <p class="login-sub" style="margin-bottom:24px">El enlace de verificación es inválido o ha expirado.</p>
        <a href="/login/" class="btn btn-ghost btn-full" style="display:block;text-align:center">Volver al login</a>
      </div>
    </div>
  </div>
  <script src="/verify/verify.js" defer></script>
    <script type="speculationrules">
    {
      "prefetch": [{
        "source": "document",
        "where": { "and": [
          { "href_matches": "/*" },
          { "not": { "href_matches": "/api/*" } },
          { "not": { "selector_matches": "[target=_blank]" } },
          { "not": { "selector_matches": "[rel~=nofollow]" } }
        ]},
        "eagerness": "moderate"
      }]
    }
    </script>
</body>

</html>
