server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # ── API proxy → servicio backend ─────────────────────────────────────────
    location /api/ {
        proxy_pass         http://backend:8765;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # SSE / streaming: deshabilitar buffering
        proxy_set_header   Connection '';
        proxy_buffering    off;
        proxy_cache        off;
        chunked_transfer_encoding on;
    }

    # ── Ficheros estáticos con URLs limpias ──────────────────────────────────
    # Primero busca el fichero tal cual (assets/, etc.)
    # Si no existe, reintenta bajo pages/ (páginas de la app)
    location / {
        try_files $uri $uri/ @pages;
    }

    location @pages {
        try_files /pages$uri /pages$uri/ /pages$uri/index.html =404;
    }

    # Deshabilitar logs de favicon para reducir ruido
    location = /favicon.ico { log_not_found off; access_log off; }
}
